version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - exhaustive
    - funlen
    - gocognit
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocognit:
      min-complexity: 15
    exhaustive:
      default-signifies-exhaustive: false
      check-generated: true
    mnd:
      ignored-numbers:
        - '0'
        - '1'
        - '2'
        - '10'
        - '100'
      ignored-functions:
        - 'make'
        - 'time.*'
    funlen:
      lines: 80
      statements: 50
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
  exclusions:
    generated: lax
    rules:
      - linters:
          - funlen
          - gocognit
          - mnd
          - dupl
        path: _test\.go
    paths:
      - third_party$
      - builtin$
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/guny524/codessey_b2_2)
      skip-generated: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
